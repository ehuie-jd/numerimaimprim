<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numérima Imprim - Imprimerie & Solutions Digitales</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#000000',
                            orange: '#f97316',
                            orangeHover: '#ea580c',
                            whatsapp: '#25D366', 
                            whatsappHover: '#128C7E'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .product-card:hover img { transform: scale(1.05); }
        .cart-badge { animation: bounce 0.3s ease-in-out; }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #000; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-900 flex flex-col min-h-screen selection:bg-brand-orange selection:text-white">

    <!-- En-tête -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <!-- Logo -->
                <div class="text-2xl font-extrabold cursor-pointer flex items-center gap-2 group" onclick="navigate('home')">
                    <div class="bg-brand-blue p-1.5 rounded-lg group-hover:bg-brand-orange transition-colors">
                        <i class="fas fa-print text-white text-lg"></i>
                    </div>
                    <span class="tracking-tight">Numé<span class="text-brand-orange">rima</span></span>
                </div>

                <!-- Navigation Desktop -->
                <nav class="hidden md:flex items-center space-x-8 font-semibold text-sm">
                    <button onclick="navigate('home')" class="hover:text-brand-orange transition py-2">Accueil</button>
                    <button onclick="navigate('shop')" class="hover:text-brand-orange transition py-2">Nos Services</button>
                    <button onclick="navigate('contact')" class="hover:text-brand-orange transition py-2">Contact</button>
                </nav>

                <!-- Actions -->
                <div class="flex items-center space-x-5">
                    <button onclick="navigate('cart')" class="relative p-2 group" title="Mon Panier">
                        <i class="fas fa-shopping-bag text-xl group-hover:text-brand-orange transition"></i>
                        <span id="cart-count" class="absolute top-0 right-0 bg-brand-orange text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center border-2 border-white">0</span>
                    </button>
                    <button class="md:hidden text-2xl" onclick="toggleMobileMenu()">
                        <i class="fas fa-bars-staggered"></i>
                    </button>
                </div>
            </div>
            
            <!-- Menu Mobile -->
            <div id="mobile-menu" class="hidden md:hidden absolute left-0 right-0 top-full bg-white border-b shadow-xl p-6 flex flex-col space-y-4 font-bold text-center">
                <button onclick="navigate('home'); toggleMobileMenu()" class="hover:text-brand-orange">Accueil</button>
                <button onclick="navigate('shop'); toggleMobileMenu()" class="hover:text-brand-orange">Boutique</button>
                <button onclick="navigate('contact'); toggleMobileMenu()" class="hover:text-brand-orange">Contact</button>
            </div>
        </div>
    </header>

    <!-- Contenu Dynamique -->
    <main id="app-content" class="flex-grow">
        <!-- JS injectera le contenu ici -->
    </main>

    <!-- Pied de page -->
    <footer class="bg-black text-gray-400 py-16">
        <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-12">
            <div class="md:col-span-1">
                <div class="text-white text-2xl font-extrabold mb-6 flex items-center gap-2">
                    <i class="fas fa-print text-brand-orange"></i> Numérima
                </div>
                <p class="text-sm leading-relaxed mb-6">L'excellence de l'impression et de la stratégie digitale à votre portée. Qualité garantie et livraison rapide.</p>
                <div class="flex space-x-4">
                    <a href="#" class="hover:text-brand-orange transition"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="hover:text-brand-orange transition"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
            <div>
                <h4 class="text-white font-bold mb-6 uppercase text-xs tracking-widest">Navigation</h4>
                <ul class="space-y-4 text-sm">
                    <li><button onclick="navigate('shop')" class="hover:text-brand-orange transition">Tous les produits</button></li>
                    <li><button onclick="navigate('shop', 'physique')" class="hover:text-brand-orange transition">Imprimerie</button></li>
                    <li><button onclick="navigate('shop', 'numerique')" class="hover:text-brand-orange transition">Solutions Digitales</button></li>
                </ul>
            </div>
            <div>
                <h4 class="text-white font-bold mb-6 uppercase text-xs tracking-widest">Aide</h4>
                <ul class="space-y-4 text-sm">
                    <li><button onclick="navigate('contact')" class="hover:text-brand-orange transition">Demander un devis</button></li>
                    <li><button onclick="navigate('contact')" class="hover:text-brand-orange transition">Suivi de commande</button></li>
                </ul>
            </div>
            <div>
                <h4 class="text-white font-bold mb-6 uppercase text-xs tracking-widest">Contact</h4>
                <ul class="space-y-4 text-sm">
                    <li class="flex items-start gap-3"><i class="fas fa-map-marker-alt text-brand-orange mt-1"></i> Abidjan, Côte d'Ivoire</li>
                    <li class="flex items-center gap-3"><i class="fab fa-whatsapp text-brand-orange"></i> +225 07 48 87 26 76</li>
                </ul>
            </div>
        </div>
        <div class="container mx-auto px-4 border-t border-gray-800 mt-16 pt-8 text-center text-xs">
            <p>&copy; 2024 Numérima Imprim. Développé pour la performance.</p>
        </div>
    </footer>

    <!-- Bouton WhatsApp Flottant -->
    <a href="https://wa.me/2250748872676" target="_blank" class="fixed bottom-6 right-6 bg-brand-whatsapp text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-2xl hover:scale-110 transition z-50">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const WHATSAPP_NUMBER = "2250748872676"; 
        
        const products = [
            { id: 1, name: "Cartes de Visite Premium", type: "physique", price: 8000, oldPrice: 10000, image: "https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&w=600&q=80", description: "Lot de 100 cartes de visite, papier mat 350g avec pelliculage. Design professionnel inclus.", popular: true, promo: true },
            { id: 2, name: "Flyers A5 Promotionnels", type: "physique", price: 15000, image: "https://images.unsplash.com/photo-1563298723-dcfebaa392e3?auto=format&fit=crop&w=600&q=80", description: "Impression de 100 flyers A5, papier couché brillant 135g. Parfait pour vos événements.", popular: true, promo: false },
            { id: 3, name: "Ebook : Sourcing Chine", type: "numerique", price: 5000, image: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&w=600&q=80", description: "Apprenez à importer depuis Alibaba vers l'Afrique comme un pro. Format PDF interactif.", popular: true, promo: false },
            { id: 4, name: "Template CV Moderne", type: "numerique", price: 2000, image: "https://images.unsplash.com/photo-1586281380349-632531db7ed4?auto=format&fit=crop&w=600&q=80", description: "Modèle professionnel éditable sur Word pour booster votre carrière.", popular: false, promo: false },
            { id: 5, name: "Roll-up Publicitaire 85x200", type: "physique", price: 35000, image: "https://images.unsplash.com/photo-1621538356948-4e8ce989ba6e?auto=format&fit=crop&w=600&q=80", description: "Support de communication vertical avec impression HD sur bâche de qualité.", popular: false, promo: false },
            { id: 6, name: "Coaching E-commerce (1h)", type: "numerique", price: 25000, oldPrice: 40000, image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80", description: "Session de coaching personnalisée pour lancer votre business en ligne.", popular: true, promo: true },
            { id: 7, name: "Tampon Encreur Officiel", type: "physique", price: 12000, image: "https://images.unsplash.com/photo-1598332120305-649061df4003?auto=format&fit=crop&w=600&q=80", description: "Tampon robuste pour entreprise, personnalisable avec logo.", popular: false, promo: false },
            { id: 8, name: "Gestion Réseaux Sociaux", type: "numerique", price: 75000, image: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&w=600&q=80", description: "Pack mensuel : Création de visuels et rédaction de posts hebdomadaires.", popular: false, promo: true }
        ];

        let cart = JSON.parse(localStorage.getItem('numerima_cart')) || [];
        const appContent = document.getElementById('app-content');
        
        function formatPrice(p) { return new Intl.NumberFormat('fr-FR').format(p) + ' FCFA'; }

        function navigate(page, param = null) {
            window.scrollTo(0, 0);
            updateCartCount();
            appContent.innerHTML = '';
            appContent.classList.remove('fade-in');
            void appContent.offsetWidth; // Trigger reflow
            appContent.classList.add('fade-in');

            switch(page) {
                case 'home': appContent.innerHTML = renderHome(); break;
                case 'shop': appContent.innerHTML = renderShop(param); break;
                case 'product': appContent.innerHTML = renderProduct(param); break;
                case 'cart': appContent.innerHTML = renderCart(); break;
                case 'contact': appContent.innerHTML = renderContact(); break;
                default: appContent.innerHTML = renderHome();
            }
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        function renderHome() {
            const popularHtml = products.filter(p => p.popular).map(p => productCard(p)).join('');
            return `
                <section class="relative bg-black text-white py-24 overflow-hidden">
                    <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1562564055-71e051d33c19?auto=format&fit=crop&w=1500&q=80')] bg-cover bg-center"></div>
                    <div class="container mx-auto px-4 relative z-10 flex flex-col md:flex-row items-center gap-12">
                        <div class="md:w-1/2 text-center md:text-left">
                            <span class="inline-block bg-brand-orange text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-[0.2em] mb-6">Expertise 225</span>
                            <h1 class="text-5xl md:text-7xl font-extrabold leading-tight mb-6">Imprimez votre <br><span class="text-brand-orange underline decoration-white/20 underline-offset-8">Succès.</span></h1>
                            <p class="text-lg text-gray-300 mb-10 max-w-lg mx-auto md:mx-0">De la carte de visite à votre stratégie digitale, Numérima transforme vos idées en résultats concrets.</p>
                            <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                                <button onclick="navigate('shop')" class="bg-brand-orange hover:bg-brand-orangeHover px-10 py-4 rounded-xl font-bold transition shadow-xl shadow-brand-orange/20">Explorer la boutique</button>
                                <button onclick="navigate('contact')" class="bg-white/10 hover:bg-white/20 backdrop-blur-md px-10 py-4 rounded-xl font-bold transition">Nous contacter</button>
                            </div>
                        </div>
                        <div class="md:w-1/2 hidden md:block group">
                            <div class="relative">
                                <div class="absolute -inset-4 bg-brand-orange/20 rounded-2xl blur-2xl group-hover:bg-brand-orange/30 transition duration-500"></div>
                                <img src="https://images.unsplash.com/photo-1603536348611-1378f8982f6e?auto=format&fit=crop&w=800&q=80" class="relative rounded-2xl shadow-2xl grayscale group-hover:grayscale-0 transition duration-700">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="py-20 bg-white">
                    <div class="container mx-auto px-4 text-center mb-16">
                        <h2 class="text-3xl font-extrabold mb-4">Pourquoi nous choisir ?</h2>
                        <div class="w-20 h-1 bg-brand-orange mx-auto"></div>
                    </div>
                    <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
                        <div class="p-8 rounded-3xl bg-[#fafafa] border border-gray-100">
                            <div class="w-16 h-16 bg-white shadow-sm rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl text-brand-orange"><i class="fas fa-gem"></i></div>
                            <h3 class="font-bold text-xl mb-3">Qualité Premium</h3>
                            <p class="text-gray-500 text-sm">Nous utilisons les meilleurs papiers et technologies pour un rendu professionnel.</p>
                        </div>
                        <div class="p-8 rounded-3xl bg-[#fafafa] border border-gray-100">
                            <div class="w-16 h-16 bg-white shadow-sm rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl text-brand-orange"><i class="fas fa-bolt"></i></div>
                            <h3 class="font-bold text-xl mb-3">Rapidité</h3>
                            <p class="text-gray-500 text-sm">Vos commandes sont traitées et livrées dans les meilleurs délais sur Abidjan.</p>
                        </div>
                        <div class="p-8 rounded-3xl bg-[#fafafa] border border-gray-100">
                            <div class="w-16 h-16 bg-white shadow-sm rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl text-brand-orange"><i class="fas fa-headset"></i></div>
                            <h3 class="font-bold text-xl mb-3">Support Actif</h3>
                            <p class="text-gray-500 text-sm">Notre équipe est disponible sur WhatsApp pour vous conseiller en direct.</p>
                        </div>
                    </div>
                </section>

                <section class="py-24 bg-[#fafafa]">
                    <div class="container mx-auto px-4 flex justify-between items-end mb-12">
                        <div>
                            <h2 class="text-3xl font-extrabold">Nos Incontournables</h2>
                            <p class="text-gray-500 mt-2">Les supports préférés de nos clients.</p>
                        </div>
                        <button onclick="navigate('shop')" class="text-brand-orange font-bold hover:underline">Voir tout le catalogue <i class="fas fa-chevron-right text-xs ml-1"></i></button>
                    </div>
                    <div class="container mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                        ${popularHtml}
                    </div>
                </section>
            `;
        }

        function renderShop(filter = null) {
            const filtered = filter ? products.filter(p => p.type === filter) : products;
            const itemsHtml = filtered.map(p => productCard(p)).join('');
            return `
                <div class="bg-white border-b border-gray-100 py-16">
                    <div class="container mx-auto px-4 text-center">
                        <h1 class="text-4xl font-extrabold mb-4">Notre Boutique</h1>
                        <div class="flex justify-center gap-4 mt-8">
                            <button onclick="navigate('shop')" class="px-6 py-2 rounded-full text-sm font-bold ${!filter ? 'bg-black text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'} transition">Tous</button>
                            <button onclick="navigate('shop', 'physique')" class="px-6 py-2 rounded-full text-sm font-bold ${filter === 'physique' ? 'bg-black text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'} transition">Imprimerie</button>
                            <button onclick="navigate('shop', 'numerique')" class="px-6 py-2 rounded-full text-sm font-bold ${filter === 'numerique' ? 'bg-black text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'} transition">Digital</button>
                        </div>
                    </div>
                </div>
                <div class="container mx-auto px-4 py-16 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    ${itemsHtml}
                </div>
            `;
        }

        function productCard(p) {
            const badge = p.promo ? `<span class="absolute top-4 left-4 bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded-full z-10">PROMO</span>` : '';
            return `
                <div class="product-card group bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition duration-500 flex flex-col h-full">
                    <div class="relative h-64 overflow-hidden cursor-pointer bg-gray-100" onclick="navigate('product', ${p.id})">
                        <img src="${p.image}" class="w-full h-full object-cover transition duration-700">
                        ${badge}
                        <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition duration-300"></div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <p class="text-[10px] font-black tracking-widest text-gray-400 uppercase">${p.type === 'physique' ? 'Impression' : 'Digital'}</p>
                            <span class="text-brand-orange font-bold text-sm">${formatPrice(p.price)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 group-hover:text-brand-orange transition mb-4 cursor-pointer" onclick="navigate('product', ${p.id})">${p.name}</h3>
                        <div class="mt-auto pt-4 border-t border-gray-50 flex items-center justify-between">
                            <button onclick="navigate('product', ${p.id})" class="text-xs font-bold text-gray-500 hover:text-black transition">Détails <i class="fas fa-arrow-right ml-1"></i></button>
                            <button onclick="addToCart(${p.id}); event.stopPropagation();" class="bg-black text-white w-10 h-10 rounded-2xl flex items-center justify-center hover:bg-brand-orange transition-all duration-300 transform active:scale-90 shadow-lg">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProduct(id) {
            const p = products.find(prod => prod.id === id);
            if(!p) return `<div class="py-24 text-center">Produit introuvable.</div>`;
            return `
                <div class="container mx-auto px-4 py-16">
                    <button onclick="navigate('shop')" class="text-gray-400 hover:text-black mb-10 flex items-center gap-2 font-semibold">
                        <i class="fas fa-arrow-left"></i> Retour à la boutique
                    </button>
                    <div class="bg-white rounded-[40px] shadow-sm border border-gray-100 overflow-hidden flex flex-col lg:flex-row">
                        <div class="lg:w-1/2 p-12 bg-[#fafafa]">
                            <img src="${p.image}" class="w-full h-[500px] object-cover rounded-3xl shadow-2xl">
                        </div>
                        <div class="lg:w-1/2 p-12 flex flex-col justify-center">
                            <span class="text-brand-orange font-black tracking-widest text-xs uppercase mb-4">${p.type}</span>
                            <h1 class="text-4xl font-extrabold mb-4">${p.name}</h1>
                            <p class="text-3xl font-bold mb-8">${formatPrice(p.price)}</p>
                            <div class="bg-gray-50 p-6 rounded-2xl mb-10 border-l-4 border-brand-orange">
                                <p class="text-gray-600 leading-relaxed">${p.description}</p>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-4">
                                <button onclick="addToCart(${p.id}, true)" class="flex-1 bg-black hover:bg-gray-800 text-white font-bold py-5 px-8 rounded-2xl transition">Ajouter au panier</button>
                                <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('Bonjour Numérima, je souhaite commander : ' + p.name)}" target="_blank" class="flex-1 bg-brand-whatsapp hover:bg-brand-whatsappHover text-white font-bold py-5 px-8 rounded-2xl transition text-center flex items-center justify-center gap-3">
                                    <i class="fab fa-whatsapp text-xl"></i> Acheter direct
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCart() {
            if(cart.length === 0) return `<div class="py-32 text-center bg-white"><div class="mb-6 text-gray-200"><i class="fas fa-shopping-bag text-8xl"></i></div><h2 class="text-3xl font-extrabold mb-4">Votre panier est vide</h2><p class="text-gray-500 mb-10">Découvrez nos services d'impression et digital.</p><button onclick="navigate('shop')" class="bg-black text-white px-10 py-4 rounded-2xl font-bold">Voir la boutique</button></div>`;
            
            let total = 0;
            const itemsHtml = cart.map((item, idx) => {
                total += item.price * item.quantity;
                return `
                    <div class="flex flex-col sm:flex-row items-center justify-between py-8 border-b border-gray-50 gap-6">
                        <div class="flex items-center gap-6 w-full">
                            <img src="${item.image}" class="w-24 h-24 object-cover rounded-2xl shadow-sm">
                            <div>
                                <h4 class="font-extrabold text-lg">${item.name}</h4>
                                <p class="text-brand-orange font-bold text-sm">${formatPrice(item.price)}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-8 justify-between w-full sm:w-auto">
                            <div class="flex items-center bg-gray-100 rounded-xl px-2">
                                <button onclick="updateQty(${idx}, -1)" class="p-3 text-gray-500 hover:text-black font-black text-lg">-</button>
                                <span class="px-4 font-bold min-w-[40px] text-center">${item.quantity}</span>
                                <button onclick="updateQty(${idx}, 1)" class="p-3 text-gray-500 hover:text-black font-black text-lg">+</button>
                            </div>
                            <button onclick="removeFromCart(${idx})" class="w-10 h-10 flex items-center justify-center text-gray-300 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="container mx-auto px-4 py-20 flex flex-col lg:flex-row gap-16">
                    <div class="lg:w-2/3">
                        <h1 class="text-4xl font-extrabold mb-12">Mon Panier <span class="text-gray-300 text-2xl font-light ml-2">(${cart.length} articles)</span></h1>
                        <div class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-100">${itemsHtml}</div>
                    </div>
                    <div class="lg:w-1/3">
                        <div class="bg-white p-10 rounded-[40px] shadow-xl border border-gray-100 sticky top-32">
                            <h3 class="font-extrabold text-xl mb-8">Récapitulatif</h3>
                            <div class="space-y-4 mb-8">
                                <div class="flex justify-between text-gray-500 text-sm"><span>Sous-total</span><span>${formatPrice(total)}</span></div>
                                <div class="flex justify-between text-gray-500 text-sm"><span>Livraison</span><span class="text-green-600 font-bold">À convenir</span></div>
                                <div class="border-t border-gray-100 pt-6 mt-6 flex justify-between items-end">
                                    <span class="font-bold text-lg">Total</span>
                                    <span class="text-3xl font-black text-brand-orange">${formatPrice(total)}</span>
                                </div>
                            </div>
                            <button onclick="checkoutViaWhatsApp()" class="w-full bg-brand-whatsapp hover:bg-brand-whatsappHover text-white font-bold py-5 rounded-2xl transition shadow-xl shadow-brand-whatsapp/20 flex items-center justify-center gap-4">
                                <i class="fab fa-whatsapp text-xl"></i> Finaliser sur WhatsApp
                            </button>
                            <p class="text-center text-[10px] text-gray-400 mt-6 px-4 uppercase tracking-widest font-bold">Paiement sécurisé via Orange/MTN Money</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderContact() {
            return `
                <div class="container mx-auto px-4 py-24 text-center max-w-2xl">
                    <div class="bg-white p-16 rounded-[50px] shadow-sm border border-gray-100">
                        <div class="w-24 h-24 bg-brand-orange/10 text-brand-orange rounded-full flex items-center justify-center text-4xl mx-auto mb-10"><i class="fas fa-comments"></i></div>
                        <h2 class="text-4xl font-extrabold mb-6 tracking-tight">Besoin d'un devis sur mesure ?</h2>
                        <p class="text-gray-500 leading-relaxed mb-12 text-lg">Nos experts vous répondent instantanément sur WhatsApp pour vos projets spécifiques (Imprimerie grand format, packaging, ou consulting).</p>
                        <a href="https://wa.me/${WHATSAPP_NUMBER}" target="_blank" class="inline-block bg-brand-whatsapp text-white px-12 py-5 rounded-2xl font-bold shadow-2xl hover:bg-brand-whatsappHover transition hover:scale-105 duration-300">Démarrer la discussion</a>
                    </div>
                </div>
            `;
        }

        function addToCart(pId, redirect = false) {
            const p = products.find(prod => prod.id === pId);
            const exists = cart.find(item => item.id === pId);
            if(exists) exists.quantity += 1;
            else cart.push({...p, quantity: 1});
            saveCart();
            updateCartCount();
            
            const badge = document.getElementById('cart-count');
            badge.classList.remove('cart-badge');
            void badge.offsetWidth;
            badge.classList.add('cart-badge');

            if(redirect) navigate('cart');
        }

        function updateQty(idx, delta) {
            cart[idx].quantity += delta;
            if(cart[idx].quantity <= 0) cart.splice(idx, 1);
            saveCart();
            renderCart();
            navigate('cart');
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            saveCart();
            navigate('cart');
        }

        function saveCart() { localStorage.setItem('numerima_cart', JSON.stringify(cart)); }
        function updateCartCount() {
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = total;
        }

        function checkoutViaWhatsApp() {
            if (cart.length === 0) return;
            let msg = "*🛒 NOUVELLE COMMANDE NUMÉRIMA*\n\n";
            let total = 0;
            cart.forEach(item => {
                let sub = item.price * item.quantity;
                total += sub;
                msg += `🔹 ${item.quantity}x ${item.name} (${formatPrice(sub)})\n`;
            });
            msg += `\n*💰 TOTAL : ${formatPrice(total)}*\n\nBonjour Numérima, voici mon panier. Quelles sont les prochaines étapes ?`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => navigate('home');
    </script>
</body>
</html>
