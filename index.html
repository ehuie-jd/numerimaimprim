<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numérima Imprim - Imprimerie & Solutions Digitales</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#000000',
                            orange: '#f97316',
                            orangeHover: '#ea580c',
                            whatsapp: '#25D366', 
                            whatsappHover: '#128C7E'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .product-card:hover img { transform: scale(1.05); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #000; border-radius: 10px; }
        .modal-overlay { transition: all 0.3s ease; }
        .modal-content { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .input-focus:focus-within { border-color: #f97316; ring: 2px; ring-color: #f97316; }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-900 flex flex-col min-h-screen selection:bg-brand-orange selection:text-white">

    <!-- En-tête -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="text-2xl font-extrabold cursor-pointer flex items-center gap-2 group" onclick="navigate('home')">
                    <div class="bg-brand-blue p-1.5 rounded-lg group-hover:bg-brand-orange transition-colors text-white flex items-center justify-center">
                        <i class="fas fa-print text-lg"></i>
                    </div>
                    <span class="tracking-tight">Numé<span class="text-brand-orange">rima</span></span>
                </div>

                <nav class="hidden md:flex items-center space-x-8 font-semibold text-sm">
                    <button onclick="navigate('home')" class="hover:text-brand-orange transition py-2 text-gray-600">Accueil</button>
                    <button onclick="navigate('shop')" class="hover:text-brand-orange transition py-2 text-gray-600">Boutique</button>
                    <button onclick="navigate('contact')" class="hover:text-brand-orange transition py-2 text-gray-600">Contact</button>
                </nav>

                <div class="flex items-center space-x-5">
                    <button onclick="navigate('cart')" class="relative p-2 group" title="Mon Panier">
                        <i class="fas fa-shopping-bag text-xl group-hover:text-brand-orange transition"></i>
                        <span id="cart-count" class="absolute top-0 right-0 bg-brand-orange text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center border-2 border-white">0</span>
                    </button>
                    <button class="md:hidden text-2xl" onclick="toggleMobileMenu()">
                        <i class="fas fa-bars-staggered"></i>
                    </button>
                </div>
            </div>
            
            <div id="mobile-menu" class="hidden md:hidden absolute left-0 right-0 top-full bg-white border-b shadow-xl p-6 flex flex-col space-y-4 font-bold text-center">
                <button onclick="navigate('home'); toggleMobileMenu()" class="hover:text-brand-orange">Accueil</button>
                <button onclick="navigate('shop'); toggleMobileMenu()" class="hover:text-brand-orange">Boutique</button>
                <button onclick="navigate('contact'); toggleMobileMenu()" class="hover:text-brand-orange">Contact</button>
            </div>
        </div>
    </header>

    <main id="app-content" class="flex-grow">
        <!-- JS injecte le contenu ici -->
    </main>

    <footer class="bg-black text-gray-400 py-16">
        <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-12 text-center md:text-left">
            <div class="md:col-span-1">
                <div class="text-white text-2xl font-extrabold mb-6 flex items-center justify-center md:justify-start gap-2">
                    <i class="fas fa-print text-brand-orange"></i> Numérima
                </div>
                <p class="text-sm leading-relaxed mb-6">Expertise 225. Qualité garantie et livraison rapide partout à Abidjan.</p>
            </div>
            <div>
                <h4 class="text-white font-bold mb-6 uppercase text-xs tracking-widest">Navigation</h4>
                <ul class="space-y-4 text-sm">
                    <li><button onclick="navigate('shop')" class="hover:text-brand-orange transition">Tous les produits</button></li>
                    <li><button onclick="navigate('shop', 'kit')" class="hover:text-brand-orange transition text-brand-orange font-bold">Nos Kits 🔥</button></li>
                    <li><button onclick="navigate('shop', 'physique')" class="hover:text-brand-orange transition">Imprimerie</button></li>
                </ul>
            </div>
            <div>
                <h4 class="text-white font-bold mb-6 uppercase text-xs tracking-widest">Contact</h4>
                <ul class="space-y-4 text-sm">
                    <li class="flex items-center justify-center md:justify-start gap-3"><i class="fab fa-whatsapp text-brand-orange"></i> +225 07 48 87 26 76</li>
                    <li class="flex items-center justify-center md:justify-start gap-3"><i class="fas fa-map-marker-alt text-brand-orange"></i> Abidjan, Côte d'Ivoire</li>
                </ul>
            </div>
        </div>
    </footer>

    <!-- MODAL DE COMMANDE AMÉLIORÉ -->
    <div id="checkout-modal" class="fixed inset-0 z-[100] hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="modal-content relative bg-white rounded-t-[3rem] sm:rounded-[2.5rem] p-8 shadow-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-slate-900 tracking-tighter">Validation Commande</h3>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-slate-200 transition">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- Récapitulatif de commande -->
            <div class="mb-8 p-6 bg-slate-50 rounded-[2rem] border border-slate-100">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fas fa-receipt text-brand-orange"></i>
                    <span class="text-xs font-black uppercase text-slate-400 tracking-widest">Votre Panier</span>
                </div>
                <div id="checkout-summary-list" class="space-y-2 mb-4 text-sm font-medium text-slate-600">
                    <!-- JS populate items -->
                </div>
                <div class="pt-4 border-t border-slate-200 flex justify-between items-center">
                    <span class="font-bold text-slate-900">Total à payer</span>
                    <span id="checkout-total" class="text-xl font-black text-brand-orange">0 FCFA</span>
                </div>
            </div>

            <form id="order-form" onsubmit="handleOrderSubmit(event)" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-4">Nom et Prénoms</label>
                    <div class="relative flex items-center">
                        <i class="fas fa-user absolute left-5 text-slate-300"></i>
                        <input type="text" id="cust-name" required placeholder="Ex: Jean-Marc Koffi" 
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-brand-orange focus:bg-white transition shadow-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-4">Numéro WhatsApp</label>
                    <div class="relative flex items-center">
                        <i class="fab fa-whatsapp absolute left-5 text-slate-300"></i>
                        <input type="tel" id="cust-phone" required placeholder="Ex: 07 00 00 00 00" 
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-brand-orange focus:bg-white transition shadow-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-4">Lieu de Livraison</label>
                    <div class="relative flex items-center">
                        <i class="fas fa-map-marker-alt absolute left-5 text-slate-300"></i>
                        <input type="text" id="cust-location" required placeholder="Ex: Cocody Angré 8e Tranche" 
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-brand-orange focus:bg-white transition shadow-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-4">Instructions Spéciales (Optionnel)</label>
                    <textarea id="cust-note" rows="2" placeholder="Ex: Appelez-moi avant d'arriver..." 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-brand-orange focus:bg-white transition shadow-sm resize-none"></textarea>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-brand-whatsapp text-white font-black py-5 rounded-2xl transition hover:bg-brand-whatsappHover hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-4 shadow-xl shadow-brand-whatsapp/20">
                        <i class="fab fa-whatsapp text-2xl"></i> CONFIRMER SUR WHATSAPP
                    </button>
                    <p class="text-[10px] text-center text-slate-400 mt-4 uppercase tracking-widest font-bold">Paiement sécurisé à la livraison</p>
                </div>
            </form>
        </div>
    </div>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/2250748872676" target="_blank" class="fixed bottom-6 right-6 bg-brand-whatsapp text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-2xl hover:scale-110 transition z-50">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const WHATSAPP_NUMBER = "2250748872676";

        const products = [
            { id: 1, name: "Photocopie N&B", type: "physique", price: 25, unit: "/ page", image: "https://github.com/ehuie-jd/assets-produits/blob/main/Photocopie-N%26B.png?raw=true", description: "Canon - Papier 70g/80g.", popular: true },
            { id: 2, name: "Impression Couleur", type: "physique", price: 100, unit: "/ page", image: "https://github.com/ehuie-jd/assets-produits/blob/main/Impression-Couleur.png?raw=true", description: "Laser HP M577 haute qualité.", promo: true, popular: true },
            { id: 100, name: "Kit Entrepreneur Pro", type: "kit", price: 45000, oldPrice: 60000, image: "https://images.unsplash.com/photo-1586769852836-bc069f19e1b6?auto=format&fit=crop&w=600&q=80", description: "Pack complet : Logo + 100 Cartes + 50 Flyers + Page Facebook.", promo: true, popular: true },
            { id: 3, name: "Saisie & Mise en Page", type: "numerique", price: 500, unit: "/ page", image: "https://github.com/ehuie-jd/assets-produits/blob/main/Saisie-Mise-en-Page.png?raw=true", description: "Traitement de texte professionnel." },
            { id: 4, name: "Numérisation (Scan)", type: "numerique", price: 100, unit: "/ doc", image: "https://github.com/ehuie-jd/assets-produits/blob/main/Num%C3%A9risation-(Scan).png?raw=true", description: "Scan HD vers Email/USB." },
            { id: 5, name: "Plastification", type: "physique", price: 300, unit: "", image: "https://github.com/ehuie-jd/assets-produits/blob/main/Plastification.png?raw=true", description: "Protection A4/A3." },
            { id: 6, name: "Reliure", type: "physique", price: 500, unit: "", image: "https://github.com/ehuie-jd/assets-produits/blob/main/Reliure.png?raw=true", description: "Spirale ou Thermique." }
        ];

        let cart = JSON.parse(localStorage.getItem('numerima_cart')) || [];
        const appContent = document.getElementById('app-content');
        
        function formatPrice(p) { return new Intl.NumberFormat('fr-FR').format(p) + ' FCFA'; }

        function navigate(page, param = null) {
            window.scrollTo(0, 0);
            updateCartCount();
            appContent.innerHTML = '';
            appContent.classList.remove('fade-in');
            void appContent.offsetWidth;
            appContent.classList.add('fade-in');

            switch(page) {
                case 'home': appContent.innerHTML = renderHome(); break;
                case 'shop': appContent.innerHTML = renderShop(param); break;
                case 'product': appContent.innerHTML = renderProduct(param); break;
                case 'cart': appContent.innerHTML = renderCart(); break;
                case 'contact': appContent.innerHTML = renderContact(); break;
                default: appContent.innerHTML = renderHome();
            }
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        function productCard(p) {
            const badge = p.promo ? `<span class="absolute top-4 left-4 bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded-full z-10">PROMO</span>` : '';
            return `
                <div class="product-card group bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition duration-500 flex flex-col h-full">
                    <div class="relative h-64 overflow-hidden cursor-pointer bg-gray-100" onclick="navigate('product', ${p.id})">
                        <img src="${p.image}" class="w-full h-full object-cover transition duration-700">
                        ${badge}
                        <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition duration-300"></div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow text-center md:text-left">
                        <div class="flex justify-between items-start mb-2">
                            <p class="text-[10px] font-black tracking-widest text-gray-400 uppercase">${p.type}</p>
                            <span class="text-brand-orange font-bold text-sm">${formatPrice(p.price)}${p.unit || ''}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 group-hover:text-brand-orange transition mb-4 cursor-pointer" onclick="navigate('product', ${p.id})">${p.name}</h3>
                        <div class="mt-auto pt-4 border-t border-gray-50 flex items-center justify-between">
                            <button onclick="navigate('product', ${p.id})" class="text-xs font-bold text-gray-500 hover:text-black transition">Détails <i class="fas fa-arrow-right ml-1"></i></button>
                            <button onclick="addToCart(${p.id}); event.stopPropagation();" class="bg-black text-white w-10 h-10 rounded-2xl flex items-center justify-center hover:bg-brand-orange transition shadow-lg">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHome() {
            const popularHtml = products.filter(p => p.popular).map(p => productCard(p)).join('');
            return `
                <section class="relative bg-black text-white py-24 overflow-hidden">
                    <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1562564055-71e051d33c19?auto=format&fit=crop&w=1500&q=80')] bg-cover bg-center"></div>
                    <div class="container mx-auto px-4 relative z-10 text-center md:text-left">
                        <div class="max-w-2xl">
                            <h1 class="text-5xl md:text-7xl font-extrabold leading-tight mb-6 uppercase">Votre Succès,<br><span class="text-brand-orange">Notre Impression.</span></h1>
                            <p class="text-lg text-gray-300 mb-10">Solutions d'imprimerie et kits marketing à Abidjan. Le partenaire des entrepreneurs.</p>
                            <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                                <button onclick="navigate('shop')" class="bg-brand-orange hover:bg-brand-orangeHover px-10 py-4 rounded-xl font-bold transition shadow-xl shadow-brand-orange/20">Explorer la Boutique</button>
                                <button onclick="navigate('shop', 'kit')" class="bg-white/10 hover:bg-white/20 border border-white/20 px-10 py-4 rounded-xl font-bold transition backdrop-blur-sm">Voir nos Kits</button>
                            </div>
                        </div>
                    </div>
                </section>
                <section class="py-24 bg-[#fafafa]">
                    <div class="container mx-auto px-4">
                        <h2 class="text-3xl font-black mb-12 uppercase italic tracking-tighter">Nos incontournables</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                            ${popularHtml}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderShop(filter = null) {
            const filtered = filter ? products.filter(p => p.type === filter) : products;
            const itemsHtml = filtered.map(p => productCard(p)).join('');
            return `
                <div class="bg-white border-b border-gray-100 py-16">
                    <div class="container mx-auto px-4 text-center">
                        <h1 class="text-4xl font-extrabold mb-8 uppercase tracking-tighter">Catalogue iNumérima</h1>
                        <div class="flex flex-wrap justify-center gap-4">
                            <button onclick="navigate('shop')" class="px-6 py-2 rounded-full text-sm font-bold ${!filter ? 'bg-black text-white' : 'bg-gray-100 text-gray-600'} transition">Tous</button>
                            <button onclick="navigate('shop', 'kit')" class="px-6 py-2 rounded-full text-sm font-bold ${filter === 'kit' ? 'bg-brand-orange text-white' : 'bg-gray-100 text-gray-600'} transition">Nos Kits 🔥</button>
                            <button onclick="navigate('shop', 'physique')" class="px-6 py-2 rounded-full text-sm font-bold ${filter === 'physique' ? 'bg-black text-white' : 'bg-gray-100 text-gray-600'} transition">Impression</button>
                            <button onclick="navigate('shop', 'numerique')" class="px-6 py-2 rounded-full text-sm font-bold ${filter === 'numerique' ? 'bg-black text-white' : 'bg-gray-100 text-gray-600'} transition">Digital</button>
                        </div>
                    </div>
                </div>
                <div class="container mx-auto px-4 py-16 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    ${itemsHtml}
                </div>
            `;
        }

        function renderProduct(id) {
            const p = products.find(prod => prod.id === id);
            if(!p) return `<div class="py-24 text-center">Produit introuvable.</div>`;
            return `
                <div class="container mx-auto px-4 py-16">
                    <button onclick="navigate('shop')" class="text-gray-400 hover:text-black mb-10 font-semibold"><i class="fas fa-arrow-left"></i> Retour</button>
                    <div class="bg-white rounded-[40px] shadow-sm border border-gray-100 overflow-hidden flex flex-col lg:flex-row">
                        <div class="lg:w-1/2 p-12 bg-[#fafafa]">
                            <img src="${p.image}" class="w-full h-auto max-h-[500px] object-contain rounded-3xl shadow-xl mx-auto">
                        </div>
                        <div class="lg:w-1/2 p-12 flex flex-col justify-center">
                            <span class="text-brand-orange font-black text-xs uppercase mb-4 tracking-widest">${p.type}</span>
                            <h1 class="text-4xl font-extrabold mb-4 tracking-tighter">${p.name}</h1>
                            <p class="text-3xl font-black mb-8">${formatPrice(p.price)}${p.unit || ''}</p>
                            <div class="bg-slate-50 p-6 rounded-2xl mb-10 border-l-4 border-brand-orange">
                                <p class="text-gray-600 leading-relaxed font-medium">${p.description}</p>
                            </div>
                            <button onclick="addToCart(${p.id}, true)" class="w-full bg-black text-white font-black py-6 rounded-2xl hover:bg-brand-orange transition-all shadow-xl shadow-brand-orange/10 uppercase tracking-widest">Ajouter au panier</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCart() {
            if(cart.length === 0) return `<div class="py-32 text-center bg-white"><h2 class="text-3xl font-extrabold mb-4 uppercase tracking-tighter">Votre Panier est Vide</h2><button onclick="navigate('shop')" class="bg-black text-white px-10 py-4 rounded-2xl font-bold uppercase tracking-widest">Voir les services</button></div>`;
            let total = 0;
            const itemsHtml = cart.map((item, idx) => {
                total += item.price * item.quantity;
                return `
                    <div class="flex items-center justify-between py-6 border-b border-gray-50 flex-wrap gap-4">
                        <div class="flex items-center gap-6">
                            <img src="${item.image}" class="w-20 h-20 object-cover rounded-2xl shadow-sm">
                            <div><h4 class="font-extrabold text-lg line-clamp-1">${item.name}</h4><p class="text-brand-orange font-bold text-sm">${formatPrice(item.price)}</p></div>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="flex items-center bg-gray-100 rounded-xl"><button onclick="updateQty(${idx}, -1)" class="px-4 py-2 font-black">-</button><span class="px-2 font-bold">${item.quantity}</span><button onclick="updateQty(${idx}, 1)" class="px-4 py-2 font-black">+</button></div>
                            <button onclick="removeFromCart(${idx})" class="text-gray-300 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="container mx-auto px-4 py-20 flex flex-col lg:flex-row gap-16">
                    <div class="lg:w-2/3">
                        <h1 class="text-4xl font-extrabold mb-12 uppercase italic tracking-tighter">Mon Panier</h1>
                        <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-gray-100">${itemsHtml}</div>
                    </div>
                    <div class="lg:w-1/3">
                        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-gray-100 text-center sticky top-32">
                            <h3 class="text-gray-400 mb-2 uppercase text-[10px] font-black tracking-[0.2em]">Total à payer</h3>
                            <span class="text-4xl font-black text-brand-orange block mb-10">${formatPrice(total)}</span>
                            <button onclick="openCheckoutModal()" class="w-full bg-brand-whatsapp text-white font-black py-6 rounded-2xl flex items-center justify-center gap-4 hover:scale-[1.03] transition shadow-xl shadow-brand-whatsapp/20">
                                <i class="fab fa-whatsapp text-2xl"></i> PASSER À LA VALIDATION
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderContact() {
            return `
                <div class="container mx-auto px-4 py-24 text-center max-w-2xl">
                    <div class="bg-white p-16 rounded-[4rem] shadow-sm border border-gray-100">
                        <div class="w-20 h-20 bg-brand-orange/10 text-brand-orange rounded-full flex items-center justify-center text-3xl mx-auto mb-10"><i class="fas fa-comments"></i></div>
                        <h2 class="text-4xl font-extrabold mb-6 uppercase italic tracking-tighter">Besoin d'un devis ?</h2>
                        <p class="text-gray-500 mb-12 leading-relaxed">Contactez nos experts directement sur WhatsApp pour toute demande spécifique ou commande en gros volume.</p>
                        <a href="https://wa.me/${WHATSAPP_NUMBER}" target="_blank" class="inline-block bg-brand-whatsapp text-white px-12 py-5 rounded-2xl font-black shadow-xl shadow-brand-whatsapp/20 uppercase tracking-widest hover:scale-105 transition">Lancer la discussion</a>
                    </div>
                </div>
            `;
        }

        function addToCart(id, notify = true) {
            const p = products.find(prod => prod.id === id);
            const index = cart.findIndex(item => item.id === id);
            if(index > -1) { cart[index].quantity++; } else { cart.push({...p, quantity: 1}); }
            saveCart();
            updateCartCount();
            if(notify) navigate('cart');
        }

        function updateQty(idx, delta) {
            cart[idx].quantity += delta;
            if(cart[idx].quantity < 1) cart[idx].quantity = 1;
            saveCart();
            navigate('cart');
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            saveCart();
            navigate('cart');
        }

        function saveCart() { localStorage.setItem('numerima_cart', JSON.stringify(cart)); }
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = count;
        }

        function openCheckoutModal() { 
            const summaryList = document.getElementById('checkout-summary-list');
            const summaryTotal = document.getElementById('checkout-total');
            let total = 0;
            
            summaryList.innerHTML = '';
            cart.forEach(item => {
                total += item.price * item.quantity;
                const li = document.createElement('div');
                li.className = "flex justify-between";
                li.innerHTML = `<span>${item.name} <span class="text-slate-400">x${item.quantity}</span></span> <span>${formatPrice(item.price * item.quantity)}</span>`;
                summaryList.appendChild(li);
            });
            
            summaryTotal.innerText = formatPrice(total);
            document.getElementById('checkout-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('checkout-modal').classList.add('hidden'); }

        function handleOrderSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const location = document.getElementById('cust-location').value;
            const note = document.getElementById('cust-note').value;

            let total = 0;
            let itemsText = "";
            cart.forEach(item => {
                total += item.price * item.quantity;
                itemsText += `- ${item.name} (x${item.quantity})\n`;
            });

            const text = `*NOUVELLE COMMANDE iNUMÉRIMA*\n\n` +
                         `👤 *Client :* ${name}\n` +
                         `📞 *Tél :* ${phone}\n` +
                         `📍 *Livraison :* ${location}\n` +
                         (note ? `📝 *Note :* ${note}\n` : '') +
                         `\n*Services :*\n${itemsText}\n` +
                         `*TOTAL À PAYER : ${formatPrice(total)}*`;

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`);
            
            // Clean up
            closeModal();
            cart = [];
            saveCart();
            navigate('home');
        }

        window.onload = () => navigate('home');
    </script>
</body>
</html>
